services:
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:15
    container_name: wg-easy
    environment:
      - PORT=${ui_port}
      - HOST=0.0.0.0
      - INSECURE=true
      - DISABLE_IPV6=true
      - INIT_ENABLED=true
      - INIT_USERNAME=${init_username}
      - INIT_PASSWORD=${init_password}
      - INIT_HOST=${init_host}
      - INIT_PORT=${server_port}
      - INIT_DNS=${wireguard_dns}
      - INIT_IPV4_CIDR=${wireguard_ipv4_cidr}
      - INIT_IPV6_CIDR=${wireguard_ipv6_cidr}
      - INIT_ALLOWED_IPS=${init_allowed_ips}
    volumes:
      - etc_wireguard:/etc/wireguard
      - /lib/modules:/lib/modules:ro
    ports:
      - "${server_port}:${server_port}/udp"
      - "127.0.0.1:${ui_port}:${ui_port}/tcp"
    logging:
      driver: awslogs
      options:
        awslogs-region: ${region}
        awslogs-group: ${log_group_name}
        awslogs-stream: wg-easy
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1

volumes:
  etc_wireguard:
